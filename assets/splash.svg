<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">Wizard fort duel on a tabletop board</title>
  <desc id="desc">Two magical circular forts face each other across a tabletop grid, with miniature soldiers marching between them.</desc>
  <defs>
    <linearGradient id="table" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2c2118"/>
      <stop offset="0.52" stop-color="#3d3329"/>
      <stop offset="1" stop-color="#241e1d"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="50%" cy="74%" r="38%">
      <stop offset="0" stop-color="#b7ffb5" stop-opacity="0.9"/>
      <stop offset="0.22" stop-color="#6de879" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#6de879" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="50%" cy="25%" r="38%">
      <stop offset="0" stop-color="#ffc2ff" stop-opacity="0.9"/>
      <stop offset="0.22" stop-color="#b36dff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#b36dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

